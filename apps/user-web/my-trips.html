<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WanderViệt — Lịch trình của tôi</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&family=Outfit:wght@500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css?v=1776819067181" />
  <link rel="stylesheet" href="planner.css?v=1776819067181" />
  <link rel="stylesheet" href="voice-guide.css?v=1776819067181">
</head>
<body>
  <!-- HEADER -->
  <header class="site-header" data-header>
    <div class="container header-inner">
      <a href="index.html" class="logo" aria-label="WanderViệt — Trang chủ">
        <span class="logo-mark" aria-hidden="true">◈</span>
        WanderViệt
      </a>

      <button type="button" class="nav-toggle" aria-expanded="false" aria-controls="site-nav" data-nav-toggle>
        <span class="nav-toggle-bar"></span>
        <span class="visually-hidden">Mở menu</span>
      </button>

      <nav id="site-nav" class="site-nav" data-nav>
        <ul class="nav-list">
          <li><a href="index.html" class="nav-link">🏠 Trang chủ</a></li>
          <li><a href="index.html#destinations" class="nav-link">📍 Điểm du lịch</a></li>
          <li><a href="planner.html" class="nav-link">✨ AI Trợ lý</a></li>
          <li><a href="my-trips.html" class="nav-link active">🎒 Chuyến đi</a></li>
          <li><a href="quests.html" class="nav-link">🎯 Nhiệm vụ</a></li>
          <li><a href="leaderboard.html" class="nav-link">🏆 BXH</a></li>
        </ul>
      </nav>

      <div class="header-actions">
        <button type="button" class="btn-icon notif-btn-user" onclick="WanderUI.toggleNotificationDrawer()" aria-label="Thông báo">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
          <span class="wander-notif-badge" data-notif-badge></span>
        </button>

        <button type="button" class="btn-icon" data-open-settings title="Cài đặt">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        </button>

        <button type="button" class="btn btn--sm btn--primary" data-auth-open data-auth-hide>Tham gia</button>

        <div class="user-bubble" data-user-bubble data-auth-show style="display:none">
          <span id="header-user-rank" style="font-size:0.75rem;font-weight:700;margin-right:4px;opacity:0.9;"></span>
          <button type="button" class="user-bubble__btn" data-user-toggle aria-expanded="false" aria-haspopup="true" aria-label="Menu tài khoản">
            <img src="" alt="Avatar" class="user-avatar-img" data-user-avatar hidden />
            <span class="user-bubble__initial" data-user-initial>?</span>
          </button>
          <div class="user-dropdown" data-user-dropdown hidden>
            <div class="user-dropdown__header">
              <p class="user-dropdown__name" data-user-name></p>
            </div>
            <div class="user-dropdown__body">
              <button type="button" class="user-dropdown__item" data-open-profile>
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                Hồ sơ của tôi
              </button>
              
              <div class="user-dropdown__divider"></div>
              <button type="button" class="user-dropdown__item user-dropdown__item--danger" data-logout>
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                Đăng xuất
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </header>

  <main class="container" style="padding-top: 8rem; padding-bottom: 4rem; max-width: 900px;">
    <h1 style="font-size: 2.5rem; margin-bottom: 2rem; display: flex; align-items: center; gap: 0.5rem;">
      🎒 Chuyến Đi Của Tôi
    </h1>
    
    <div id="unauthorizedMsg" style="display: none; background: var(--bg-elevated); padding: 3rem; text-align: center; border-radius: 1rem; box-shadow: var(--shadow-sm); border: 1px solid var(--border);">
      <h2 style="margin-bottom: 1rem; color: #f43f5e;">Bạn chưa Đăng Nhập!</h2>
      <p style="color: #64748b; margin-bottom: 2rem;">Vui lòng đăng nhập để xem lại các lịch trình bạn đã lưu.</p>
      <a href="index.html#login" class="btn btn--primary">Quay lại Đăng nhập</a>
    </div>

    <style>
      .trips-tabs {
        display: flex;
        gap: 0.75rem;
        margin-bottom: 2rem;
        border-bottom: 1px solid #e2e8f0;
        padding-bottom: 0.5rem;
        overflow-x: auto;
      }
      .tab-btn {
        background: none;
        border: none;
        padding: 0.6rem 1.2rem;
        font-family: 'Outfit', sans-serif;
        font-weight: 600;
        font-size: 0.95rem;
        color: var(--text-muted);
        cursor: pointer;
        border-radius: 0.75rem;
        transition: all 0.2s;
        white-space: nowrap;
      }
      .tab-btn:hover {
        background: var(--bg-card);
        color: var(--text);
      }
      .tab-btn.active {
        background: var(--text);
        color: var(--bg);
      }
      .tab-btn[data-tab="trash"] {
        margin-left: auto;
      }
      .tab-btn[data-tab="trash"]:hover {
        background: #fef2f2;
        color: #ef4444;
      }
      .tab-btn[data-tab="trash"].active {
        background: #ef4444;
        color: #fff;
      }

      /* Button Styles */
      .btn-v2 {
        border: 1px solid var(--border);
        background: var(--surface);
        padding: 0.5rem 0.75rem;
        border-radius: 0.6rem;
        cursor: pointer;
        transition: all 0.2s;
        font-size: 0.9rem;
        display: flex;
        align-items: center;
        gap: 0.4rem;
        color: var(--text);
      }
      .btn-v2:hover {
        background: var(--bg-card);
        border-color: var(--text-muted);
      }
      .btn-v2.btn--primary {
        background: var(--text);
        color: var(--bg);
        border-color: var(--text);
      }
      .btn-v2.btn--primary:hover {
        background: var(--accent);
        color: #fff;
        border-color: var(--accent);
        transform: translateY(-1px);
      }
      .btn-text {
        background: none;
        border: none;
        padding: 0.4rem 0.6rem;
        font-size: 0.85rem;
        font-weight: 600;
        cursor: pointer;
        border-radius: 0.4rem;
        transition: background 0.2s;
        color: var(--text-muted);
      }
      .btn-text:hover {
        background: var(--bg-card);
        color: var(--text);
      }
    </style>

    <div id="tripsContainer" style="display: none;">
      <!-- Tab Navigation -->
      <div class="trips-tabs" id="tripsTabs">
        <button class="tab-btn active" data-tab="planning">Đang lên lịch</button>
        <button class="tab-btn" data-tab="completed">Đã đi</button>
        <button class="tab-btn" data-tab="missed">Bỏ lỡ</button>
        <button class="tab-btn" data-tab="trash">Thùng rác</button>
      </div>

      <!-- Danh sách lịch trình -->
      <div id="tripsList" style="display: flex; flex-direction: column; gap: 1.5rem;">
         <p style="text-align: center; color: var(--text-muted); margin-top: 2rem;">Đang tải danh sách chuyến đi...</p>
      </div>
    </div>
  </main>

  <!-- Voice AI Guide UI -->
  <button id="voice-btn" class="voice-btn-floating pulse" title="Hỏi trợ lý ảo">
      <span id="voice-icon">🔊</span>
  </button>

  <div id="voice-indicator" class="voice-indicator">
      <div class="waves">
          <div class="wave"></div><div class="wave"></div><div class="wave"></div>
          <div class="wave"></div><div class="wave"></div>
      </div>
      <div class="voice-text">
          <span id="voice-status-text">Đang lắng nghe...</span>
          <div id="status-text" class="voice-chat-preview"></div>
      </div>
  </div>

  <script src="voice-helper.js?v=1776819067181"></script>
  <script src="SharedUI.js" defer></script>
  <script src="main.js" defer></script>
  <script src="my-trips.js?v=1776819067181"></script>
</body>
</html>
