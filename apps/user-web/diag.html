<!DOCTYPE html>
<html>
<head>
    <title>Connectivity Diag</title>
</head>
<body>
    <h1>Connectivity Diag</h1>
    <div id="results">Testing...</div>
    <script>
        async function diag() {
            const results = document.getElementById('results');
            try {
                results.innerHTML += '<p>Testing fetch /api/chat...</p>';
                const res = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: 'ping', deviceId: 'diag' })
                });
                results.innerHTML += '<p>Status: ' + res.status + '</p>';
                const data = await res.json();
                results.innerHTML += '<p>Data: ' + JSON.stringify(data) + '</p>';
            } catch (err) {
                results.innerHTML += '<p style="color:red">Error: ' + err.message + '</p>';
                results.innerHTML += '<p style="color:red">Stack: ' + err.stack + '</p>';
            }
        }
        diag();
    </script>
</body>
</html>
