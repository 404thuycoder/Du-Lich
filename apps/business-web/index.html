<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WanderViệt Partner — Business Ecosystem</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&family=Outfit:wght@500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="business-design.css" />
  <style>
    .initial-loader { position: fixed; inset: 0; display:flex; align-items:center; justify-content:center; gap:1rem; flex-direction:column; background:#040914; color:#94A3B8; }
    .spinner { width:40px; height:40px; border:3px solid rgba(255,255,255,0.07); border-top-color:#00F0FF; border-radius:50%; animation:spin 1s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }
    @keyframes authSlideIn { from { opacity:0; transform:translateY(24px) scale(0.97); } to { opacity:1; transform:translateY(0) scale(1); } }
    /* Input focus glow */
    input:focus { outline:none; border-color:#00F0FF !important; box-shadow:0 0 0 3px rgba(0,240,255,0.1) !important; }
  </style>
</head>
<body>
  <div id="root">
    <div class="initial-loader">
      <div class="spinner"></div>
      <span>Đang khởi tạo hệ sinh thái...</span>
    </div>
  </div>

  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel">
    const { useState, useEffect, useMemo, useCallback } = React;

    /* ============================================================
       MOCK AUTH SERVICE
       Thay đổi mockLogin() bằng fetch() thật khi có backend.
    ============================================================ */
    const AUTH_TOKEN_KEY = 'biz_auth_token';
    const AUTH_USER_KEY  = 'biz_auth_user';
    const REG_DB_KEY     = 'biz_registered_users';

    function getRegisteredDb() {
      try {
        var raw = localStorage.getItem(REG_DB_KEY);
        return raw ? JSON.parse(raw) : [];
      } catch(e) { return []; }
    }
    function saveRegisteredDb(db) {
      try { localStorage.setItem(REG_DB_KEY, JSON.stringify(db)); } catch(e) {}
    }

    const mockAuthService = {
      login(email, password, rememberMe) {
        return fetch('/api/auth/business/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: email, password: password })
        })
        .then(res => res.json())
        .then(data => {
          // Fallback cho tài khoản demo cứng (phòng trường hợp DB chưa có)
          if (!data.success && email === 'admin@company.com' && password === '123456') {
            var user  = { id:'biz_001', name:'Admin Company', email:email, displayName:'Admin Company', tier:'VIP' };
            var token = 'mock_biz_token_' + Date.now();
            var store = rememberMe ? localStorage : sessionStorage;
            store.setItem(AUTH_TOKEN_KEY, token);
            store.setItem(AUTH_USER_KEY, JSON.stringify(user));
            return { success:true, user:user, token:token };
          }
          if (data.success) {
            var store = rememberMe ? localStorage : sessionStorage;
            store.setItem(AUTH_TOKEN_KEY, data.token);
            store.setItem(AUTH_USER_KEY, JSON.stringify(data.user));
          }
          return data;
        })
        .catch(err => {
          return { success: false, message: 'Lỗi kết nối máy chủ.' };
        });
      },
      register(name, email, password) {
        return fetch('/api/auth/business/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name: name, email: email, password: password })
        })
        .then(res => res.json())
        .then(data => {
          return data;
        })
        .catch(err => {
          return { success: false, message: 'Lỗi kết nối máy chủ.' };
        });
      },
      getSession() {
        try {
          const token = localStorage.getItem(AUTH_TOKEN_KEY) || sessionStorage.getItem(AUTH_TOKEN_KEY);
          const raw   = localStorage.getItem(AUTH_USER_KEY)  || sessionStorage.getItem(AUTH_USER_KEY);
          if (token && raw) return { token, user: JSON.parse(raw) };
        } catch(e) {}
        return null;
      },
      logout() {
        [localStorage, sessionStorage].forEach(s => {
          s.removeItem(AUTH_TOKEN_KEY);
          s.removeItem(AUTH_USER_KEY);
        });
      },
      forgotPassword(email) {
        // Mock: chấp nhận mọi email hợp lệ, trả OTP 6 số
        return new Promise(resolve => setTimeout(() => {
          const emailRx = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
          if (!emailRx.test(email)) {
            resolve({ success: false, message: 'Email không hợp lệ.' });
          } else {
            const otp = String(Math.floor(100000 + Math.random() * 900000));
            // Lưu tạm vào sessionStorage để bước sau verify
            sessionStorage.setItem('biz_reset_email', email);
            sessionStorage.setItem('biz_reset_otp', otp);
            console.info('[DEV] OTP:', otp); // Chỉ hiện trong dev console
            resolve({ success: true, otp }); // Trả về để hiện demo
          }
        }, 1000));
      },
      verifyOtp(inputOtp) {
        return new Promise(resolve => setTimeout(() => {
          const saved = sessionStorage.getItem('biz_reset_otp');
          if (inputOtp === saved) resolve({ success: true });
          else resolve({ success: false, message: 'Mã OTP không đúng hoặc đã hết hạn.' });
        }, 600));
      },
      resetPassword(newPassword) {
        return new Promise(resolve => setTimeout(() => {
          sessionStorage.removeItem('biz_reset_otp');
          sessionStorage.removeItem('biz_reset_email');
          resolve({ success: true });
        }, 800));
      }
    };

    /* ============================================================
       AUTH SCREEN COMPONENT
    ============================================================ */
    function AuthScreen({ onLoginSuccess }) {
      // mode: 'login' | 'register' | 'forgot' | 'otp' | 'reset' | 'done'
      const [mode, setMode]           = useState('login');
      const [email, setEmail]         = useState('');
      const [password, setPassword]   = useState('');
      const [bizName, setBizName]     = useState('');
      const [rememberMe, setRemember] = useState(false);
      const [showPass, setShowPass]   = useState(false);
      const [showNewPass, setShowNewPass] = useState(false);
      const [error, setError]         = useState('');
      const [info, setInfo]           = useState('');
      const [loading, setLoading]     = useState(false);
      const [fieldErr, setFieldErr]   = useState({});
      // forgot-password state
      const [fpEmail, setFpEmail]     = useState('');
      const [fpOtp, setFpOtp]         = useState('');
      const [fpOtpHint, setFpOtpHint] = useState(''); // dev hint
      const [fpNewPw, setFpNewPw]     = useState('');
      const [fpConfirm, setFpConfirm] = useState('');

      const switchMode = () => { setMode(m => m === 'login' ? 'register' : 'login'); setError(''); setFieldErr({}); };

      const validate = () => {
        const errs = {};
        const emailRx = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        if (!email)                  errs.email    = 'Vui lòng nhập email.';
        else if (!emailRx.test(email)) errs.email  = 'Email không đúng định dạng.';
        if (!password)               errs.password = 'Vui lòng nhập mật khẩu.';
        else if (password.length < 6) errs.password = 'Mật khẩu phải có ít nhất 6 ký tự.';
        if (mode === 'register' && !bizName) errs.bizName = 'Vui lòng nhập tên doanh nghiệp.';
        return errs;
      };

      const handleSubmit = async (e) => {
        e.preventDefault();
        setError('');
        const errs = validate();
        if (Object.keys(errs).length) { setFieldErr(errs); return; }
        setFieldErr({});
        setLoading(true);
        try {
          if (mode === 'login') {
            const res = await mockAuthService.login(email, password, rememberMe);
            if (res.success) {
              onLoginSuccess(res.user);
            } else {
              setError(res.message || 'Đăng nhập thất bại. Vui lòng thử lại.');
            }
          } else if (mode === 'register') {
            const res = await mockAuthService.register(bizName, email, password);
            if (res.success) {
              setMode('login');
              setInfo('Đăng ký thành công! Vui lòng đăng nhập bằng tài khoản vừa tạo.');
              setPassword(''); // Xóa mật khẩu cho an toàn
            } else {
              setError(res.message || 'Đăng ký thất bại. Vui lòng thử lại.');
            }
          }
        } catch(err) {
          setError('Không thể kết nối đến máy chủ. Kiểm tra lại mạng.');
        } finally {
          setLoading(false);
        }
      };

      const inp = (hasErr) => ({
        width:'100%', boxSizing:'border-box',
        background: hasErr ? 'rgba(255,0,85,0.07)' : 'rgba(255,255,255,0.05)',
        border: `1.5px solid ${hasErr ? '#f43f5e' : 'rgba(255,255,255,0.1)'}`,
        borderRadius:'12px', padding:'0.85rem 1rem', color:'white',
        fontFamily:'var(--biz-font)', fontSize:'0.95rem',
        transition:'border-color 0.2s', outline:'none'
      });

      // ── Forgot password handlers ──────────────────────────
      const handleFpSendOtp = async (e) => {
        e.preventDefault();
        setError(''); setInfo('');
        if (!fpEmail) { setError('Vui lòng nhập email.'); return; }
        setLoading(true);
        try {
          const res = await mockAuthService.forgotPassword(fpEmail);
          if (res.success) {
            setFpOtpHint(res.otp); // hint chỉ hiện trong UI demo
            setMode('otp');
            setInfo('Đã gửi mã OTP! Kiểm tra email của bạn.');
          } else { setError(res.message); }
        } catch { setError('Lỗi kết nối. Thử lại.'); }
        finally { setLoading(false); }
      };

      const handleFpVerifyOtp = async (e) => {
        e.preventDefault();
        setError('');
        if (!fpOtp || fpOtp.length !== 6) { setError('OTP gồm 6 chữ số.'); return; }
        setLoading(true);
        try {
          const res = await mockAuthService.verifyOtp(fpOtp);
          if (res.success) { setMode('reset'); setInfo(''); }
          else { setError(res.message); }
        } catch { setError('Lỗi xác thực. Thử lại.'); }
        finally { setLoading(false); }
      };

      const handleFpReset = async (e) => {
        e.preventDefault();
        setError('');
        if (!fpNewPw || fpNewPw.length < 6) { setError('Mật khẩu mới phải có ít nhất 6 ký tự.'); return; }
        if (fpNewPw !== fpConfirm) { setError('Xác nhận mật khẩu không khớp.'); return; }
        setLoading(true);
        try {
          const res = await mockAuthService.resetPassword(fpNewPw);
          if (res.success) { setMode('done'); }
          else { setError(res.message || 'Có lỗi xảy ra.'); }
        } catch { setError('Lỗi kết nối. Thử lại.'); }
        finally { setLoading(false); }
      };

      const goBackToLogin = () => { setMode('login'); setError(''); setInfo(''); setFpEmail(''); setFpOtp(''); setFpOtpHint(''); setFpNewPw(''); setFpConfirm(''); };

      return (
        <div style={{
          minHeight:'100vh', display:'flex', alignItems:'center',
          justifyContent:'center', background:'#040914',
          fontFamily:'var(--biz-font)', padding:'1rem',
          backgroundImage:'radial-gradient(ellipse at 20% 50%, rgba(0,85,255,0.08) 0%, transparent 60%), radial-gradient(ellipse at 80% 20%, rgba(0,240,255,0.06) 0%, transparent 50%)'
        }}>
          <div style={{
            width:'100%', maxWidth:'440px',
            background:'rgba(11,20,38,0.95)',
            border:'1px solid rgba(255,255,255,0.1)',
            borderRadius:'28px', padding:'2.5rem 2.5rem',
            boxShadow:'0 30px 60px rgba(0,0,0,0.6), 0 0 0 1px rgba(0,240,255,0.05)',
            animation:'authSlideIn 0.4s cubic-bezier(0.4,0,0.2,1)'
          }}>
            {/* Logo */}
            <div style={{ textAlign:'center', marginBottom:'2rem' }}>
              <div style={{ display:'inline-flex', alignItems:'center', gap:'0.6rem', fontSize:'1.5rem', fontWeight:800, color:'white', marginBottom:'0.75rem' }}>
                <span style={{ background:'linear-gradient(135deg,#0055FF,#00F0FF)', WebkitBackgroundClip:'text', WebkitTextFillColor:'transparent' }}>◈</span>
                WanderViệt
                <span style={{ fontSize:'0.7rem', fontWeight:700, background:'linear-gradient(135deg,#0055FF,#00F0FF)', WebkitBackgroundClip:'text', WebkitTextFillColor:'transparent', border:'1px solid rgba(0,240,255,0.3)', borderRadius:'6px', padding:'0.15rem 0.5rem', marginLeft:'0.2rem' }}>Business</span>
              </div>
              <p style={{ color:'#64748b', fontSize:'0.9rem', margin:0, lineHeight:1.5 }}>
                {mode === 'login'    ? 'Đăng nhập để quản lý và phát triển doanh nghiệp du lịch.'
                : mode === 'register'? 'Tạo tài khoản doanh nghiệp để bắt đầu hành trình.'
                : mode === 'forgot'  ? 'Đặt lại mật khẩu — nhập email đăng ký của bạn.'
                : mode === 'otp'     ? 'Kiểm tra email và nhập mã OTP 6 chữ số.'
                : mode === 'reset'   ? 'Tạo mật khẩu mới cho tài khoản của bạn.'
                : 'Đặt lại mật khẩu thành công!'}
              </p>
            </div>

            {/* Mode Toggle Removed: Use footer button instead */}

            {/* Error Banner */}
            {error && (
              <div style={{
                background:'rgba(244,63,94,0.1)', border:'1px solid rgba(244,63,94,0.25)',
                borderRadius:'10px', padding:'0.8rem 1rem', marginBottom:'1.2rem',
                color:'#f87171', fontSize:'0.88rem', display:'flex', alignItems:'center', gap:'0.5rem'
              }}>
                <span>⚠️</span> {error}
              </div>
            )}
            {/* Info Banner */}
            {info && !error && (
              <div style={{
                background:'rgba(16,185,129,0.08)', border:'1px solid rgba(16,185,129,0.25)',
                borderRadius:'10px', padding:'0.8rem 1rem', marginBottom:'1.2rem',
                color:'#6ee7b7', fontSize:'0.88rem', display:'flex', alignItems:'center', gap:'0.5rem'
              }}>
                <span>✉️</span> {info}
              </div>
            )}

            {/* ══ FORM LOGIN / REGISTER ══ */}
            {(mode === 'login' || mode === 'register') && (
            <form onSubmit={handleSubmit} noValidate>
              <div style={{ display:'flex', flexDirection:'column', gap:'1.1rem' }}>

                {/* Biz Name — Register only */}
                {mode === 'register' && (
                  <div>
                    <label style={{ display:'block', fontSize:'0.85rem', fontWeight:600, color:'#94a3b8', marginBottom:'0.4rem' }}>Tên doanh nghiệp</label>
                    <input value={bizName} onChange={e => { setBizName(e.target.value); setFieldErr(p => ({...p, bizName:''})); }}
                      style={inp(fieldErr.bizName)} placeholder="VD: Khách sạn Mường Thanh" />
                    {fieldErr.bizName && <span style={{ color:'#f87171', fontSize:'0.78rem' }}>{fieldErr.bizName}</span>}
                  </div>
                )}

                {/* Email */}
                <div>
                  <label style={{ display:'block', fontSize:'0.85rem', fontWeight:600, color:'#94a3b8', marginBottom:'0.4rem' }}>Email</label>
                  <input type="email" value={email} onChange={e => { setEmail(e.target.value); setFieldErr(p => ({...p, email:''})); }}
                    style={inp(fieldErr.email)} placeholder="admin@company.com" autoComplete="email" />
                  {fieldErr.email && <span style={{ color:'#f87171', fontSize:'0.78rem' }}>{fieldErr.email}</span>}
                </div>

                {/* Password */}
                <div>
                  <label style={{ display:'block', fontSize:'0.85rem', fontWeight:600, color:'#94a3b8', marginBottom:'0.4rem' }}>Mật khẩu</label>
                  <div style={{ position:'relative' }}>
                    <input type={showPass ? 'text' : 'password'} value={password}
                      onChange={e => { setPassword(e.target.value); setFieldErr(p => ({...p, password:''})); }}
                      style={{ ...inp(fieldErr.password), paddingRight:'3rem' }}
                      placeholder="Ít nhất 6 ký tự" autoComplete={mode === 'login' ? 'current-password' : 'new-password'} />
                    <button type="button" onClick={() => setShowPass(p => !p)} style={{
                      position:'absolute', right:'0.75rem', top:'50%', transform:'translateY(-50%)',
                      background:'none', border:'none', color:'#64748b', cursor:'pointer', fontSize:'1.1rem'
                    }}>{showPass ? '🙈' : '👁️'}</button>
                  </div>
                  {fieldErr.password && <span style={{ color:'#f87171', fontSize:'0.78rem' }}>{fieldErr.password}</span>}
                </div>

                {/* Remember Me + Forgot (Login only) */}
                {mode === 'login' && (
                  <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center' }}>
                    <label style={{ display:'flex', alignItems:'center', gap:'0.5rem', cursor:'pointer', fontSize:'0.87rem', color:'#94a3b8' }}>
                      <input type="checkbox" checked={rememberMe} onChange={e => setRemember(e.target.checked)}
                        style={{ width:'16px', height:'16px', accentColor:'#00F0FF', cursor:'pointer' }} />
                      Ghi nhớ đăng nhập
                    </label>
                    <button type="button" onClick={() => { setMode('forgot'); setError(''); setInfo(''); setFpEmail(email); }}
                      style={{ background:'none', border:'none', color:'#00F0FF', fontSize:'0.85rem', cursor:'pointer', fontWeight:600 }}>
                      Quên mật khẩu?
                    </button>
                  </div>
                )}

                {/* Submit Button */}
                <button type="submit" disabled={loading} style={{
                  width:'100%', padding:'0.95rem', borderRadius:'14px', border:'none',
                  background: loading ? 'rgba(255,255,255,0.1)' : 'linear-gradient(135deg,#0055FF,#00F0FF)',
                  color: loading ? '#64748b' : 'white', fontWeight:700, fontSize:'1rem',
                  fontFamily:'var(--biz-font)', cursor: loading ? 'not-allowed' : 'pointer',
                  transition:'all 0.2s', display:'flex', alignItems:'center', justifyContent:'center', gap:'0.6rem',
                  boxShadow: loading ? 'none' : '0 8px 24px rgba(0,85,255,0.35)'
                }}>
                  {loading ? (
                    <><span style={{ display:'inline-block', width:'18px', height:'18px', border:'2px solid rgba(255,255,255,0.3)', borderTopColor:'white', borderRadius:'50%', animation:'spin 0.8s linear infinite' }} />
                    {mode === 'login' ? 'Đang xác thực...' : 'Đang tạo tài khoản...'}</>
                  ) : (
                    mode === 'login' ? '🔑  Đăng nhập' : '🚀  Tạo tài khoản'
                  )}
                </button>

                {/* Demo hint */}
                {mode === 'login' && (
                  <div style={{ textAlign:'center', fontSize:'0.8rem', color:'#475569', padding:'0.6rem', background:'rgba(255,255,255,0.03)', borderRadius:'10px', border:'1px solid rgba(255,255,255,0.05)' }}>
                    Demo: <code style={{ color:'#00F0FF' }}>admin@company.com</code> / <code style={{ color:'#00F0FF' }}>123456</code>
                  </div>
                )}
              </div>
            </form>
            )}

            {/* ══ MÀN HÌNH 1: NHẬP EMAIL (forgot) ══ */}
            {mode === 'forgot' && (
              <form onSubmit={handleFpSendOtp} noValidate>
                <div style={{ display:'flex', flexDirection:'column', gap:'1rem' }}>
                  <div>
                    <label style={{ display:'block', fontSize:'0.85rem', fontWeight:600, color:'#94a3b8', marginBottom:'0.4rem' }}>Email đã đăng ký</label>
                    <input type="email" value={fpEmail} onChange={e => setFpEmail(e.target.value)}
                      style={inp(false)} placeholder="admin@company.com" autoComplete="email" autoFocus />
                  </div>
                  <button type="submit" disabled={loading} style={{
                    padding:'0.9rem', borderRadius:'12px', border:'none', fontWeight:700, fontSize:'0.95rem',
                    fontFamily:'var(--biz-font)', cursor: loading ? 'not-allowed':'pointer',
                    background: loading ? 'rgba(255,255,255,0.08)' : 'linear-gradient(135deg,#0055FF,#00F0FF)',
                    color: loading ? '#64748b':'white', display:'flex', alignItems:'center', justifyContent:'center', gap:'0.5rem'
                  }}>
                    {loading ? <><span style={{ display:'inline-block', width:'16px', height:'16px', border:'2px solid rgba(255,255,255,0.3)', borderTopColor:'white', borderRadius:'50%', animation:'spin 0.8s linear infinite' }} /> Đang gửi...</> : '📨  Gửi mã OTP'}
                  </button>
                  <button type="button" onClick={goBackToLogin} style={{ background:'none', border:'none', color:'#64748b', cursor:'pointer', fontSize:'0.88rem', textAlign:'center' }}>
                    ← Quay lại đăng nhập
                  </button>
                </div>
              </form>
            )}

            {/* ══ MÀN HÌNH 2: NHẬP OTP (otp) ══ */}
            {mode === 'otp' && (
              <form onSubmit={handleFpVerifyOtp} noValidate>
                <div style={{ display:'flex', flexDirection:'column', gap:'1rem' }}>
                  {fpOtpHint && (
                    <div style={{ textAlign:'center', fontSize:'0.8rem', color:'#475569', padding:'0.6rem 0.8rem', background:'rgba(255,255,255,0.03)', borderRadius:'10px', border:'1px solid rgba(255,255,255,0.05)' }}>
                      🧪 Dev hint — OTP: <code style={{ color:'#00F0FF', fontSize:'1rem', fontWeight:700, letterSpacing:'0.1em' }}>{fpOtpHint}</code>
                    </div>
                  )}
                  <div>
                    <label style={{ display:'block', fontSize:'0.85rem', fontWeight:600, color:'#94a3b8', marginBottom:'0.4rem' }}>Mã OTP (6 chữ số)</label>
                    <input type="text" inputMode="numeric" maxLength={6} value={fpOtp}
                      onChange={e => setFpOtp(e.target.value.replace(/\D/g,'').slice(0,6))}
                      style={{ ...inp(false), fontSize:'1.6rem', letterSpacing:'0.4em', textAlign:'center', fontWeight:700 }}
                      placeholder="______" autoFocus />
                  </div>
                  <button type="submit" disabled={loading} style={{
                    padding:'0.9rem', borderRadius:'12px', border:'none', fontWeight:700, fontSize:'0.95rem',
                    fontFamily:'var(--biz-font)', cursor: loading ? 'not-allowed':'pointer',
                    background: loading ? 'rgba(255,255,255,0.08)' : 'linear-gradient(135deg,#0055FF,#00F0FF)',
                    color: loading ? '#64748b':'white', display:'flex', alignItems:'center', justifyContent:'center', gap:'0.5rem'
                  }}>
                    {loading ? <><span style={{ display:'inline-block', width:'16px', height:'16px', border:'2px solid rgba(255,255,255,0.3)', borderTopColor:'white', borderRadius:'50%', animation:'spin 0.8s linear infinite' }} /> Đang xác thực...</> : '✅  Xác nhận OTP'}
                  </button>
                  <div style={{ display:'flex', justifyContent:'space-between', fontSize:'0.83rem' }}>

      { key:'platinum-1', rankName:'Platinum I', min:20000, max:23999, color:'#3b82f6' },
      { key:'platinum-2', rankName:'Platinum II', min:24000, max:27999, color:'#3b82f6' },
      { key:'platinum-3', rankName:'Platinum III', min:28000, max:31999, color:'#3b82f6' },
      { key:'diamond-1', rankName:'Diamond I', min:32000, max:36999, color:'#22d3ee' },
      { key:'diamond-2', rankName:'Diamond II', min:37000, max:41999, color:'#22d3ee' },
      { key:'diamond-3', rankName:'Diamond III', min:42000, max:49999, color:'#22d3ee' },
      { key:'legendary', rankName:'Legendary', min:50000, max:null, color:'#ef4444', glow:true }
    ];

    const formatVnd = (value) => {
      const num = Number(value || 0);
      return num ? `${num.toLocaleString('vi-VN')}đ` : 'Liên hệ';
    };
    const getBusinessRanking = (item) => {
      const score = Number(item.views || 0) + Number(item.clicks || 0) + Number(item.favorites || 0) + Number(item.timeSpent || 0);
      const current = RANK_LEVELS.find((x) => score >= x.min && (x.max === null || score <= x.max)) || RANK_LEVELS[0];
      const idx = RANK_LEVELS.findIndex((x) => x.key === current.key);
      const next = idx >= 0 && idx < RANK_LEVELS.length - 1 ? RANK_LEVELS[idx + 1] : null;
      let progressPercent = 100; let pointsToNext = 0;
      if (current.max !== null) {
        const range = current.max - current.min + 1;
        progressPercent = Math.min(100, Math.max(0, ((score - current.min) / range) * 100));
        pointsToNext = Math.max(0, current.max - score + 1);
      }
      return { score, rankName: current.rankName, rankColor: current.color, glow: !!current.glow, progressPercent, pointsToNext, nextRankName: next?.rankName || null };
    };
    const getRankByScore = (score) => {
      const current = RANK_LEVELS.find((x) => score >= x.min && (x.max === null || score <= x.max)) || RANK_LEVELS[0];
      const idx = RANK_LEVELS.findIndex((x) => x.key === current.key);
      const next = idx >= 0 && idx < RANK_LEVELS.length - 1 ? RANK_LEVELS[idx + 1] : null;
      let progressPercent = 100; let pointsToNext = 0;
      if (current.max !== null) {
        const range = current.max - current.min + 1;
        progressPercent = Math.min(100, Math.max(0, ((score - current.min) / range) * 100));
        pointsToNext = Math.max(0, current.max - score + 1);
      }
      return { score, rankName: current.rankName, rankColor: current.color, glow: !!current.glow, progressPercent, pointsToNext, nextRankName: next?.rankName || null };
    };
    const getServiceScore = (item) => {
      const views = Number(item.views || 0);
      const clicks = Number(item.clicks || 0);
      const favorites = Number(item.favorites || 0);
      const timeSpent = Number(item.timeSpent || 0);
      return views + clicks * 3 + favorites * 5 + timeSpent * 0.5;
    };

    const thStyle = { textAlign:'left', padding:'0.8rem', borderBottom:'1px solid var(--biz-border)', background:'rgba(255,255,255,0.03)', fontSize:'0.86rem' };
    const tdStyle = { padding:'0.8rem', borderBottom:'1px solid rgba(255,255,255,0.08)', fontSize:'0.9rem' };
    const inputStyle = { width:'100%', background:'rgba(255,255,255,0.05)', border:'1px solid var(--biz-border)', padding:'0.65rem 0.75rem', borderRadius:'10px', color:'white', fontFamily:'inherit' };

    /* ============================================================
       ROOT COMPONENT — Quản lý auth session
    ============================================================ */
    function AppRoot() {
      const [currentUser, setCurrentUser] = useState(null);
      const [checkingAuth, setCheckingAuth] = useState(true);

      useEffect(() => {
        // Khôi phục phiên đã lưu (localStorage hoặc sessionStorage)
        const session = mockAuthService.getSession();
        if (session) setCurrentUser(session.user);
        setCheckingAuth(false);
      }, []);

      const handleLoginSuccess = useCallback((user) => {
        setCurrentUser(user);
      }, []);

      const handleLogout = useCallback(() => {
        mockAuthService.logout();
        setCurrentUser(null);
      }, []);

      if (checkingAuth) {
        return (
          <div style={{ minHeight:'100vh', display:'flex', alignItems:'center', justifyContent:'center', background:'#040914', flexDirection:'column', gap:'1rem' }}>
            <div style={{ width:'40px', height:'40px', border:'3px solid rgba(255,255,255,0.07)', borderTopColor:'#00F0FF', borderRadius:'50%', animation:'spin 1s linear infinite' }} />
            <span style={{ color:'#64748b', fontSize:'0.9rem' }}>Đang kiểm tra phiên đăng nhập...</span>
          </div>
        );
      }

      if (!currentUser) {
        return <AuthScreen onLoginSuccess={handleLoginSuccess} />;
      }

      return <App currentUser={currentUser} onLogout={handleLogout} />;
    }

    function App({ currentUser, onLogout }) {
      const [items, setItems] = useState([]);
      const [activeTab, setActiveTab] = useState('ecosystem');
      const [searchText, setSearchText] = useState('');

      const [editingItem, setEditingItem] = useState(null);
      const [formData, setFormData] = useState(EMPTY_FORM);
      const [selectedBusinessId, setSelectedBusinessId] = useState('me');
      const [detailItem, setDetailItem] = useState(null);

      // --- Chatbot State ---
      const [isChatOpen, setIsChatOpen] = useState(false);
      const [chatMessages, setChatMessages] = useState([
        { role: 'assistant', content: 'Xin chào! Tôi là Trợ lý AI hỗ trợ doanh nghiệp. Bạn cần tư vấn chiến lược kinh doanh, viết bài PR thu hút khách hay phân tích thị trường?' }
      ]);
      const [chatInput, setChatInput] = useState('');
      const [isTyping, setIsTyping] = useState(false);
      const chatEndRef = React.useRef(null);

      useEffect(() => {
        if (chatEndRef.current) {
          chatEndRef.current.scrollIntoView({ behavior: "smooth" });
        }
      }, [chatMessages, isTyping, isChatOpen]);

      const handleSendChat = async (e) => {
        e.preventDefault();
        if (!chatInput.trim()) return;
        const newMsg = { role: 'user', content: chatInput };
        setChatMessages(prev => [...prev, newMsg]);
        setChatInput('');
        setIsTyping(true);

        try {
          const session = mockAuthService.getSession() || {};
          const token = session.token || '';
          
          const res = await fetch('/api/chat', {
            method: 'POST',
            headers: { 
              'Content-Type': 'application/json',
              'x-auth-token': token
            },
            body: JSON.stringify({
              message: newMsg.content,
              role: 'business'
            })
          });
          const data = await res.json();
          setIsTyping(false);
          if (data.success) {
            setChatMessages(prev => [...prev, { role: 'assistant', content: data.answer }]);
          } else {
            setChatMessages(prev => [...prev, { role: 'assistant', content: data.answer || 'Lỗi hệ thống.' }]);
          }
        } catch (err) {
          setIsTyping(false);
          setChatMessages(prev => [...prev, { role: 'assistant', content: 'Lỗi kết nối đến Trợ lý AI.' }]);
        }
      };

      useEffect(() => {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (raw) {
          const parsed = JSON.parse(raw);
          // Force reset if data is old (missing businessId), not expanded (less than 60 items), or missing rich metadata (overview)
          if (parsed.length > 0 && (!parsed[0].businessId || parsed.length < 60 || !parsed[0].overview)) {
            setItems(DEMO_ITEMS);
            localStorage.setItem(STORAGE_KEY, JSON.stringify(DEMO_ITEMS));
          } else {
            setItems(parsed);
          }
        } else {
          setItems(DEMO_ITEMS);
          localStorage.setItem(STORAGE_KEY, JSON.stringify(DEMO_ITEMS));
        }
      }, []);
      useEffect(() => { if (items.length) localStorage.setItem(STORAGE_KEY, JSON.stringify(items)); }, [items]);

      const filteredItems = useMemo(() => {
        const q = searchText.trim().toLowerCase();
        if (!q) return items;
        return items.filter((it) => it.name.toLowerCase().includes(q) || it.region.toLowerCase().includes(q) || it.category.toLowerCase().includes(q) || it.kind.toLowerCase().includes(q));
      }, [items, searchText]);

                        <div style={{ height:'240px', background:`linear-gradient(135deg, ${biz.rank.rankColor}88, #3b82f6)`, position:'relative' }}>
                          <div style={{ position:'absolute', bottom:'-40px', left:'40px', width:'120px', height:'120px', borderRadius:'24px', background:'#0B1426', border:'4px solid #0B1426', overflow:'hidden' }}>
                            <img src={`https://ui-avatars.com/api/?name=${encodeURIComponent(biz.name)}&background=0055FF&color=fff&size=120`} alt="Logo" style={{ width:'100%', height:'100%' }} />
                          </div>
                        </div>
                        <div style={{ padding:'60px 40px 40px' }}>
                          <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-start' }}>
                            <div>
                              <div style={{ display:'flex', alignItems:'center', gap:'1rem' }}>
                                <h2 style={{ margin:0, fontSize:'1.8rem' }}>{biz.name}</h2>
                                {rankBadge(biz.rank)}
                              </div>
                              <div style={{ display:'flex', gap:'1rem', marginTop:'0.5rem', color:'var(--biz-text-muted)' }}>
                                <span>📍 {bizItems[0]?.region || 'Việt Nam'}</span>
                                <span>⭐ {bizStats.rating.toFixed(1)} ({bizStats.reviews.toLocaleString()} đánh giá)</span>
                              </div>
                            </div>
                            <div style={{ display:'flex', gap:'0.8rem' }}>
                              <button className="btn-biz btn-biz--primary">Theo dõi</button>
                              <button className="btn-biz btn-biz--ghost">Nhắn tin</button>
                            </div>
                          </div>

                          <div style={{ marginTop:'2.5rem', display:'grid', gridTemplateColumns:'2fr 1fr', gap:'2.5rem' }}>
                            <div>
                              <h3 style={{ borderBottom:'2px solid var(--biz-accent)', display:'inline-block', paddingBottom:'0.4rem', marginBottom:'1.2rem' }}>Dịch vụ nổi bật ({bizItems.length})</h3>
                              <div style={{ display:'grid', gap:'1.2rem' }}>
                                {bizItems.length > 0 ? bizItems.map(it => (
                                  <div key={it.id} style={{ display:'flex', gap:'1.2rem', padding:'1rem', background:'var(--biz-surface-light)', borderRadius:'16px', border:'1px solid var(--biz-border)' }}>
                                    <img src={it.image} style={{ width:'140px', height:'100px', objectFit:'cover', borderRadius:'12px' }} />
                                    <div style={{ flex:1 }}>
                                      <h4 style={{ margin:0, fontSize:'1.1rem' }}>{it.name}</h4>
                                      <p style={{ fontSize:'0.85rem', color:'var(--biz-text-muted)', margin:'0.4rem 0' }}>{it.description}</p>
                                      <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center' }}>
                                        <span style={{ color:'var(--biz-accent)', fontWeight:600 }}>{formatVnd(it.priceFrom)}</span>
                                        <div style={{ display:'flex', gap:'0.5rem' }}>
                                          {it.amenities.slice(0,2).map(a => <span key={a} style={{ fontSize:'0.7rem', color:'var(--biz-text-muted)' }}>• {AMENITY_OPTIONS.find(o => o.value === a)?.label}</span>)}
                                        </div>
                                      </div>
                                    </div>
                                  </div>
                                )) : (
                                  <div style={{ padding:'2rem', textAlign:'center', color:'var(--biz-text-muted)' }}>Chưa có dịch vụ nào được công khai.</div>
                                )}
                              </div>
                            </div>
                            <div>
                              <h3 style={{ borderBottom:'2px solid var(--biz-accent)', display:'inline-block', paddingBottom:'0.4rem', marginBottom:'1.2rem' }}>Tiện ích cung cấp</h3>
                              <div style={{ display:'flex', flexWrap:'wrap', gap:'0.6rem' }}>
                                {Array.from(new Set(bizItems.flatMap(it => it.amenities))).map(val => {
                                  const opt = AMENITY_OPTIONS.find(o => o.value === val);
                                  return opt ? (
                                    <span key={val} style={{ padding:'0.4rem 0.8rem', background:'var(--biz-surface-light)', borderRadius:'99px', fontSize:'0.8rem', border:'1px solid var(--biz-border)' }}>
                                      {opt.label}
                                    </span>
                                  ) : null;
                                })}
                              </div>
                              <div style={{ marginTop:'2.5rem', padding:'1.5rem', background:'rgba(0, 240, 255, 0.05)', borderRadius:'20px', border:'1px solid rgba(0, 240, 255, 0.2)' }}>
                                <h4 style={{ margin:'0 0 0.8rem' }}>Thông tin liên hệ</h4>
                                <div style={{ display:'flex', flexDirection:'column', gap:'0.6rem', fontSize:'0.85rem' }}>
                                  <span>📧 contact@{biz.name.toLowerCase().replace(/\s+/g, '')}.com</span>
                                  <span>📞 +84 905 {Math.floor(100000 + Math.random() * 899999)}</span>
                                  <span>🌐 {biz.name.toLowerCase().replace(/\s+/g, '')}.com.vn</span>
                                </div>
                              </div>
                            </div>
                          </div>
                        </div>
                      </div>
                    );
                  })()}
                </div>
              )}
            </main>
          </div>

          {/* --- Chatbot Widget --- */}
          <div style={{ position:'fixed', bottom:'2rem', right:'2rem', zIndex:9999, display:'flex', flexDirection:'column', alignItems:'flex-end' }}>
            {isChatOpen && (
              <div className="animate-fade-up" style={{ width:'360px', height:'500px', background:'rgba(10,15,30,0.95)', backdropFilter:'blur(16px)', border:'1px solid rgba(0,240,255,0.3)', borderRadius:'20px', marginBottom:'1rem', display:'flex', flexDirection:'column', overflow:'hidden', boxShadow:'0 10px 40px rgba(0,0,0,0.5), 0 0 20px rgba(0,240,255,0.1)' }}>
                <div style={{ padding:'1rem', background:'linear-gradient(90deg, rgba(0,240,255,0.1) 0%, transparent 100%)', borderBottom:'1px solid rgba(255,255,255,0.05)', display:'flex', justifyContent:'space-between', alignItems:'center' }}>
                  <div style={{ display:'flex', alignItems:'center', gap:'0.75rem' }}>
                    <div style={{ width:'36px', height:'36px', borderRadius:'10px', background:'linear-gradient(135deg, #00F0FF, #0080FF)', display:'flex', alignItems:'center', justifyContent:'center', fontSize:'1.2rem' }}>🤖</div>
                    <div>
                      <h3 style={{ margin:0, fontSize:'1rem', fontWeight:600, color:'#fff' }}>WanderViệt AI</h3>
                      <span style={{ fontSize:'0.75rem', color:'#00F0FF' }}>Chuyên gia Doanh nghiệp</span>
                    </div>
                  </div>
                  <button onClick={() => setIsChatOpen(false)} style={{ background:'none', border:'none', color:'var(--biz-text-muted)', cursor:'pointer', fontSize:'1.5rem', lineHeight:1 }}>&times;</button>
                </div>
                
                <div style={{ flex:1, overflowY:'auto', padding:'1rem', display:'flex', flexDirection:'column', gap:'1rem' }}>
                  {chatMessages.map((msg, i) => (
                    <div key={i} style={{ display:'flex', gap:'0.75rem', flexDirection: msg.role === 'user' ? 'row-reverse' : 'row' }}>
                      {msg.role === 'assistant' && <div style={{ width:'28px', height:'28px', borderRadius:'8px', background:'rgba(0,240,255,0.2)', display:'flex', alignItems:'center', justifyContent:'center', fontSize:'0.8rem', flexShrink:0 }}>AI</div>}
                      <div style={{ padding:'0.75rem 1rem', borderRadius:'14px', fontSize:'0.9rem', lineHeight:'1.5', maxWidth:'85%',
                        background: msg.role === 'user' ? 'var(--biz-primary)' : 'rgba(255,255,255,0.05)',
                        borderBottomRightRadius: msg.role === 'user' ? 0 : '14px',
                        borderBottomLeftRadius: msg.role === 'assistant' ? 0 : '14px',
                        whiteSpace: 'pre-wrap'
                      }}>
                        {msg.content}
                      </div>
                    </div>
                  ))}
                  {isTyping && (
                    <div style={{ display:'flex', gap:'0.75rem' }}>
                      <div style={{ width:'28px', height:'28px', borderRadius:'8px', background:'rgba(0,240,255,0.2)', display:'flex', alignItems:'center', justifyContent:'center', fontSize:'0.8rem', flexShrink:0 }}>AI</div>
                      <div style={{ padding:'0.75rem 1rem', borderRadius:'14px', fontSize:'0.9rem', background:'rgba(255,255,255,0.05)', borderBottomLeftRadius:0, color:'var(--biz-text-muted)' }}>
                        <span className="dot-typing">Đang phân tích</span>
                      </div>
                    </div>
                  )}
                  <div ref={chatEndRef} />
                </div>
                
                <form onSubmit={handleSendChat} style={{ padding:'1rem', borderTop:'1px solid rgba(255,255,255,0.05)', display:'flex', gap:'0.5rem', background:'rgba(0,0,0,0.2)' }}>
                  <input type="text" value={chatInput} onChange={e => setChatInput(e.target.value)} placeholder="Hỏi chuyên gia AI..." style={{ flex:1, background:'rgba(255,255,255,0.05)', border:'1px solid rgba(255,255,255,0.1)', borderRadius:'10px', padding:'0.75rem', color:'#fff', outline:'none', fontSize:'0.9rem' }} />
                  <button type="submit" disabled={!chatInput.trim() || isTyping} style={{ background:'linear-gradient(135deg, #00F0FF, #0080FF)', border:'none', borderRadius:'10px', width:'42px', display:'flex', alignItems:'center', justifyContent:'center', color:'#fff', cursor: chatInput.trim() ? 'pointer' : 'not-allowed', opacity: chatInput.trim() ? 1 : 0.5 }}>
                    ➤
                  </button>
                </form>
              </div>
            )}
            
            <button onClick={() => setIsChatOpen(!isChatOpen)} style={{ width:'60px', height:'60px', borderRadius:'50%', background:'linear-gradient(135deg, #00F0FF, #0080FF)', border:'none', color:'#fff', fontSize:'1.8rem', display:'flex', alignItems:'center', justifyContent:'center', cursor:'pointer', boxShadow:'0 8px 32px rgba(0,240,255,0.4)', transition:'transform 0.2s' }} onMouseOver={e=>e.currentTarget.style.transform='scale(1.1)'} onMouseOut={e=>e.currentTarget.style.transform='scale(1)'}>
              {isChatOpen ? '×' : '✨'}
            </button>
          </div>

          {isModalOpen && (
            <div className="biz-modal-overlay animate-fade" onClick={closeModal}>
              <div className="biz-modal-content" style={{ maxWidth:'760px' }} onClick={(e) => e.stopPropagation()}>
                <header style={{ display:'flex', justifyContent:'space-between', marginBottom:'1.2rem' }}>
                  <h2 style={{ margin:0 }}>{editingItem ? 'Chỉnh sửa mục đã tải lên' : 'Tải lên điểm du lịch / tiện ích'}</h2>
                  <button style={{ background:'none', border:'none', color:'white', fontSize:'1.5rem', cursor:'pointer' }} onClick={closeModal}>×</button>
                </header>
                <form onSubmit={handleSubmit} style={{ display:'grid', gap:'0.95rem' }}>
                  <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:'0.9rem' }}>
                    <div><label>Loại mục</label><select value={formData.kind} onChange={(e) => setFormData((p) => ({ ...p, kind:e.target.value }))} style={inputStyle}><option value="diem-du-lich">Điểm du lịch</option><option value="tien-ich">Tiện ích</option></select></div>
                    <div><label>Tên mục *</label><input value={formData.name} onChange={(e) => setFormData((p) => ({ ...p, name:e.target.value }))} style={inputStyle} /></div>
                  </div>
                  <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:'0.9rem' }}>
                    <div><label>Phân loại *</label><input value={formData.category} onChange={(e) => setFormData((p) => ({ ...p, category:e.target.value }))} style={inputStyle} /></div>
                    <div><label>Khu vực *</label><input value={formData.region} onChange={(e) => setFormData((p) => ({ ...p, region:e.target.value }))} style={inputStyle} /></div>
                  </div>
                  <div><label>Địa chỉ chi tiết *</label><input value={formData.address} onChange={(e) => setFormData((p) => ({ ...p, address:e.target.value }))} style={inputStyle} /></div>
                  <div><label>Mô tả *</label><textarea rows="3" value={formData.description} onChange={(e) => setFormData((p) => ({ ...p, description:e.target.value }))} style={inputStyle}></textarea></div>
                  <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr 1fr 1fr', gap:'0.8rem' }}>
                    <div><label>Giá từ *</label><input type="number" value={formData.priceFrom} onChange={(e) => setFormData((p) => ({ ...p, priceFrom:e.target.value }))} style={inputStyle} /></div>
                    <div><label>Giá đến</label><input type="number" value={formData.priceTo} onChange={(e) => setFormData((p) => ({ ...p, priceTo:e.target.value }))} style={inputStyle} /></div>
                    <div><label>Giờ mở</label><input type="time" value={formData.openTime} onChange={(e) => setFormData((p) => ({ ...p, openTime:e.target.value }))} style={inputStyle} /></div>
                    <div><label>Giờ đóng</label><input type="time" value={formData.closeTime} onChange={(e) => setFormData((p) => ({ ...p, closeTime:e.target.value }))} style={inputStyle} /></div>
                  </div>
                  <div>
                    <label>Tiện ích đi kèm</label>
                    <div style={{ display:'flex', gap:'0.75rem', flexWrap:'wrap', marginTop:'0.35rem' }}>
                      {AMENITY_OPTIONS.map((o) => (
                        <label key={o.value} style={{ fontSize:'0.86rem' }}>
                          <input type="checkbox" value={o.value} checked={formData.amenities.includes(o.value)} onChange={handleAmenityChange} /> {o.label}
                        </label>
                      ))}
                    </div>
                  </div>
                  <div><label>Ảnh đại diện</label><input type="file" accept="image/*" onChange={handleImageUpload} />{formData.image && <img src={formData.image} style={{ width:'100%', height:'140px', objectFit:'cover', marginTop:'0.5rem', borderRadius:'10px' }} />}</div>
                  <div style={{ display:'flex', justifyContent:'flex-end', gap:'0.75rem', marginTop:'0.35rem' }}>
                    <button type="button" className="btn-biz btn-biz--ghost" onClick={closeModal}>Hủy</button>
                    <button type="submit" className="btn-biz btn-biz--primary">Lưu tải lên</button>
                  </div>
                </form>
              </div>
            </div>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<AppRoot />);
  </script>
</body>
</html>
